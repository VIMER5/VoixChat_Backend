syntax = "proto3";

package discovery;

service discoveryService {
  rpc registerService (serviceInfo) returns (infoResponse);
  rpc heartbeat (serviceInfo) returns (infoResponse);
  rpc getServicesbyName (servicesNameRequest) return (ListServiceInstancesResponse);
}

message serviceInfo {
  string nameService = 1;
  string ipService = 2;
  int32 portService = 3;
}
message registerResponse {
  bool access = 1;
  string message = 2;
}

message infoResponse {
  bool access = 1;
  string message = 2;
}

message ServiceInstance {
  string id = 1;
  string nameService = 2;
  string host = 3;
  int32 port = 4;
}
message servicesNameRequest {
  string nameService = 1;
}
message ServiceInstance {
  string id = 1;
  string nameService = 2;
  string host = 3;
  int32 port = 4;
}

message ListServiceInstancesResponse {
  bool access = 1;
  repeated ServiceInstance Instances = 2;
}